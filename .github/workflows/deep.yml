name: worker

on:
  push:

jobs:
  harden:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dependent: ["conjunction", "slim", "outlook", "contribute", "lady"]
        influence: ["learn", "quote", "harmful", "client"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java -jar Lm
